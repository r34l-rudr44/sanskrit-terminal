<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SANSKRIT.EXE is an interactive daily Sanskrit learning app with guided lessons, module-based practice, and progress tracking."/>
  <meta name="application-name" content="SANSKRIT.EXE"/>
  <meta name="theme-color" content="#06060A"/>
  <meta property="og:title" content="SANSKRIT.EXE"/>
  <meta property="og:description" content="Learn Sanskrit daily through interactive lessons, module practice, and progress tracking."/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="SANSKRIT.EXE"/>
  <meta property="og:locale" content="en_US"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="SANSKRIT.EXE"/>
  <meta name="twitter:description" content="Learn Sanskrit daily through interactive lessons, module practice, and progress tracking."/>
  <title>SANSKRIT.EXE — Learn Sanskrit Daily</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script>(function(){var t=localStorage.getItem('sk_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">🪔</div>
    <div>
      <div class="logo-text">SANSKRIT.EXE <span class="beta-tag">BETA</span></div>
      <div class="logo-sub">// interactive learning terminal</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="streak-badge" data-tip="Daily streak — complete one lesson per day to keep it going">🔥 <span id="streak-count">0</span>×</div>
    <script>document.getElementById('streak-count').textContent=parseInt(localStorage.getItem('sk_streak'),10)||0;</script>
    <button class="icon-btn" id="sound-toggle-btn" onclick="window.toggleSound && window.toggleSound()" title="Toggle Sound">🔊</button>
    <button class="prefs-btn" onclick="window.openPrefs && window.openPrefs()">⚙ <span class="prefs-label">PREFS</span></button>
  </div>
</header>

<div class="app">
  <div class="sidebar-wrap" id="sidebar-wrap">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner" id="sidebar-inner">
        <div class="sidebar-title">MODULE_DIRECTORY</div>
        <div class="sidebar-skel-group" aria-hidden="true">
          <div class="sidebar-skel-header">
            <div class="sidebar-skel-icon"></div>
            <div class="sidebar-skel-label sidebar-skel-label-lg"></div>
            <div class="sidebar-skel-arrow"></div>
          </div>
        </div>
        <div class="sidebar-skel-group" aria-hidden="true">
          <div class="sidebar-skel-header">
            <div class="sidebar-skel-icon"></div>
            <div class="sidebar-skel-label sidebar-skel-label-lg"></div>
            <div class="sidebar-skel-arrow"></div>
          </div>
        </div>
        <div class="sidebar-skel-group" aria-hidden="true">
          <div class="sidebar-skel-header">
            <div class="sidebar-skel-icon"></div>
            <div class="sidebar-skel-label sidebar-skel-label-lg"></div>
            <div class="sidebar-skel-arrow"></div>
          </div>
        </div>
      </div>
    </aside>
    <button class="sidebar-tab" id="hamburger-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
      <span id="sidebar-tab-icon">◀</span>
    </button>
  </div>
  <main class="main">
    <div class="screen active" id="screen-home">
      <div class="hero-card">
        <span class="hero-tag">INITIALIZING SESSION...</span>
        <div class="hero-title cursor">NAMASTE — WELCOME TO SANSKRIT</div>
        <div class="hero-sub">// Load the world's oldest language into memory.<br>// One lesson per day. One module at a time.</div>
        <button class="hero-btn" onclick="startFirstLesson()">▶ BOOT LESSON</button>
      </div>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="stat-days">0</span><span class="stat-label">DAYS_DONE</span></div>
        <div class="stat-card"><span class="stat-num" id="stat-questions">0</span><span class="stat-label">Q_ANSWERED</span></div>
        <div class="stat-card"><span class="stat-num" id="stat-accuracy">—</span><span class="stat-label">ACCURACY</span></div>
      </div>
      <div class="section-title">MODULE_DIRECTORY</div>
      <div id="home-module-list">
        <div class="module-entry module-skel-card" aria-hidden="true">
          <div class="module-entry-hdr module-skel-hdr">
            <div class="module-skel-icon"></div>
            <div class="module-entry-info">
              <div class="module-skel-line module-skel-line-id"></div>
              <div class="module-skel-line module-skel-line-title"></div>
              <div class="module-skel-line module-skel-line-sub"></div>
            </div>
            <div class="module-entry-right module-skel-right">
              <div class="module-skel-line module-skel-line-meta"></div>
              <div class="module-skel-chevron"></div>
            </div>
          </div>
        </div>
        <div class="module-entry module-skel-card" aria-hidden="true">
          <div class="module-entry-hdr module-skel-hdr">
            <div class="module-skel-icon"></div>
            <div class="module-entry-info">
              <div class="module-skel-line module-skel-line-id"></div>
              <div class="module-skel-line module-skel-line-title"></div>
              <div class="module-skel-line module-skel-line-sub"></div>
            </div>
            <div class="module-entry-right module-skel-right">
              <div class="module-skel-line module-skel-line-meta"></div>
              <div class="module-skel-chevron"></div>
            </div>
          </div>
        </div>
        <div class="module-entry module-skel-card" aria-hidden="true">
          <div class="module-entry-hdr module-skel-hdr">
            <div class="module-skel-icon"></div>
            <div class="module-entry-info">
              <div class="module-skel-line module-skel-line-id"></div>
              <div class="module-skel-line module-skel-line-title"></div>
              <div class="module-skel-line module-skel-line-sub"></div>
            </div>
            <div class="module-entry-right module-skel-right">
              <div class="module-skel-line module-skel-line-meta"></div>
              <div class="module-skel-chevron"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="bottom-bar-wrap">
  <div class="bottom-bar-tab" id="bottom-bar-tab" onclick="window.toggleBottomBar()" title="Toggle bottom bar">
    <span id="bottom-bar-tab-icon">▼</span>
  </div>
  <div class="explore-dropdown" id="explore-dropdown">
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('About Us','◈','about us','Learn about the team behind SANSKRIT.EXE and our mission to make ancient languages accessible — coming soon.')"><span>◈</span> ABOUT US</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('Our Vision','◉','our vision','Our roadmap for building the most comprehensive Sanskrit learning platform on the web — coming soon.')"><span>◉</span> OUR VISION</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('Blogs','◇','blogs','Deep dives into Sanskrit grammar, etymology, and the living legacy of the world\'s oldest language — coming soon.')"><span>◇</span> BLOGS</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('Other Products','⬡','other products','Explore our other language and education tools — coming soon.')"><span>⬡</span> OTHER PRODUCTS</button>
  </div>
  <footer class="bottom-bar" id="bottom-bar">
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('About Us','◈','about us','Learn about the team behind SANSKRIT.EXE and our mission to make ancient languages accessible — coming soon.')"><span class="bl-icon">◈</span><span class="bl-label">ABOUT US</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('Our Vision','◉','our vision','Our roadmap for building the most comprehensive Sanskrit learning platform on the web — coming soon.')"><span class="bl-icon">◉</span><span class="bl-label">OUR VISION</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('Blogs','◇','blogs','Deep dives into Sanskrit grammar, etymology, and the living legacy of the world\'s oldest language — coming soon.')"><span class="bl-icon">◇</span><span class="bl-label">BLOGS</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('Other Products','⬡','other products','Explore our other language and education tools — coming soon.')"><span class="bl-icon">⬡</span><span class="bl-label">OTHER PRODUCTS</span></button>
    <button class="bottom-bar-link bl-mobile-only" id="explore-btn" onclick="window.toggleExploreDropdown()"><span class="bl-icon">◈</span><span class="bl-label">EXPLORE ▾</span></button>
    <button class="bottom-bar-link donate-link" onclick="window.openComingSoon('Donate','♥','donate','Help keep this project alive and free for everyone. Every contribution matters — coming soon.')"><span class="bl-icon">♥</span><span class="bl-label">DONATE</span></button>
  </footer>
</div>

<script type="module" src="/src/js/home.js"></script>
</body>
</html>
