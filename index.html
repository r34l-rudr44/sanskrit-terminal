<script>document.getElementById('streak-count').textContent=parseInt(localStorage.getItem('sk_streak'),10)||0;</script>

<div class="app">

      <div class="sidebar-inner" id="sidebar-inner">
        <div class="sidebar-title">MODULE_DIRECTORY</div>
        <div class="sidebar-skel-group" aria-hidden="true">
          <div class="sidebar-skel-header">
            <div class="sidebar-skel-icon"></div>
            <div class="sidebar-skel-label sidebar-skel-label-lg"></div>
            <div class="sidebar-skel-arrow"></div>

        </div>

            <div class="sidebar-skel-label sidebar-skel-label-lg"></div>
            <div class="sidebar-skel-arrow"></div>

      <span id="sidebar-tab-icon">◀</span>
    </button>
  </div>
  <main class="main">
    <div class="screen active" id="screen-home">
      <div class="hero-card">
        <span class="hero-tag">> SESSION_01 // READY TO BEGIN</span>
        <div class="hero-title cursor">NAMASTE</div>
        <div class="curriculum-bar-wrap" id="curriculum-bar-wrap">
          <div class="cb-header">
            <span class="cb-label">CURRICULUM_PROGRESS</span>
            <span class="cb-pct" id="cb-pct">0%</span>
          </div>
          <div class="cb-track"><div class="cb-fill" id="cb-fill" style="width:0%"></div></div>
          <div class="cb-detail" id="cb-detail">// 0/0 modules completed</div>
        </div>
        <button class="hero-btn" onclick="location.href='/path.html'">▶ LEARNING PATH</button>
      </div>
      <div class="stats-row">
        <div class="stat-card stat-card--empty"><span class="stat-num" id="stat-days">—</span><span class="stat-label">LESSONS_DONE</span></div>
        <div class="stat-card stat-card--empty"><span class="stat-num" id="stat-questions">—</span><span class="stat-label">Q_ANSWERED</span></div>
        <div class="stat-card stat-card--empty"><span class="stat-num" id="stat-accuracy">—</span><span class="stat-label">ACCURACY</span></div>
      </div>
      <div id="home-widgets"></div>
    </div>
  </main>
