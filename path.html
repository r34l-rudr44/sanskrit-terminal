<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="SANSKRIT.EXE — Learning Path. Browse all modules and units."/>
  <meta name="application-name" content="SANSKRIT.EXE"/>
  <meta name="theme-color" content="#06060A"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
  <link rel="shortcut icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/site.webmanifest"/>
  <title>SANSKRIT.EXE — Learning Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Noto+Sans+Devanagari:wght@400&display=swap" rel="stylesheet"/>
  <script>(function(){var t=localStorage.getItem('sk_theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}else{document.documentElement.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');}})();</script>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body data-page="path">

<header class="topbar">
  <a class="logo" href="index.html">
    <div class="logo-icon">🪔</div>
    <div>
      <div class="logo-text">SANSKRIT.EXE <span class="beta-tag">BETA</span></div>
      <div class="logo-sub">वाग्देव्यै नमः</div>
    </div>
  </a>
  <div class="topbar-right">
    <div class="streak-badge" tabindex="0">🔥 <span id="streak-count">0</span>×</div>
    <button class="icon-btn" id="sound-toggle-btn" onclick="window.toggleSound && window.toggleSound()">🔊</button>
    <button class="prefs-btn" onclick="window.openPrefs && window.openPrefs()">⚙ <span class="prefs-label">PREFS</span></button>
  </div>
</header>
<script>document.getElementById('streak-count').textContent=parseInt(localStorage.getItem('sk_streak'),10)||0;</script>

<div class="path-page">
  <div class="path-header">
    <a class="path-back" href="index.html">← HOME</a>
    <div class="section-title">LEARNING_PATH</div>
  </div>
  <div id="home-module-list">
    <div class="module-entry module-skel-card" aria-hidden="true">
      <div class="module-entry-hdr module-skel-hdr">
        <div class="module-skel-icon"></div>
        <div class="module-entry-info">
          <div class="module-skel-line module-skel-line-id"></div>
          <div class="module-skel-line module-skel-line-title"></div>
          <div class="module-skel-line module-skel-line-sub"></div>
        </div>
        <div class="module-entry-right module-skel-right">
          <div class="module-skel-line module-skel-line-meta"></div>
          <div class="module-skel-chevron"></div>
        </div>
      </div>
    </div>
    <div class="module-entry module-skel-card" aria-hidden="true">
      <div class="module-entry-hdr module-skel-hdr">
        <div class="module-skel-icon"></div>
        <div class="module-entry-info">
          <div class="module-skel-line module-skel-line-id"></div>
          <div class="module-skel-line module-skel-line-title"></div>
          <div class="module-skel-line module-skel-line-sub"></div>
        </div>
        <div class="module-entry-right module-skel-right">
          <div class="module-skel-line module-skel-line-meta"></div>
          <div class="module-skel-chevron"></div>
        </div>
      </div>
    </div>
    <div class="module-entry module-skel-card" aria-hidden="true">
      <div class="module-entry-hdr module-skel-hdr">
        <div class="module-skel-icon"></div>
        <div class="module-entry-info">
          <div class="module-skel-line module-skel-line-id"></div>
          <div class="module-skel-line module-skel-line-title"></div>
          <div class="module-skel-line module-skel-line-sub"></div>
        </div>
        <div class="module-entry-right module-skel-right">
          <div class="module-skel-line module-skel-line-meta"></div>
          <div class="module-skel-chevron"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar-wrap">
  <div class="bottom-bar-tab" id="bottom-bar-tab" onclick="window.toggleBottomBar()" title="Toggle bottom bar">
    <span id="bottom-bar-tab-icon">▼</span><span id="bottom-bar-tab-label" class="bottom-bar-tab-label">CLOSE</span>
  </div>
  <div class="explore-dropdown" id="explore-dropdown">
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('About Us','◈','about us','Learn about the team behind SANSKRIT.EXE and our mission to make ancient languages accessible — coming soon.')"><span>◈</span> ABOUT US</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('Our Vision','◉','our vision','Our roadmap for building the most comprehensive Sanskrit learning platform on the web — coming soon.')"><span>◉</span> OUR VISION</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();location.href='/blog'"><span>◇</span> BLOGS</button>
    <button class="explore-dropdown-item" onclick="window.closeExploreDropdown();window.openComingSoon('Other Products','⬡','other products','Explore our other language and education tools — coming soon.')"><span>⬡</span> OTHER PRODUCTS</button>
  </div>
  <footer class="bottom-bar" id="bottom-bar">
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('About Us','◈','about us','Learn about the team behind SANSKRIT.EXE and our mission to make ancient languages accessible — coming soon.')"><span class="bl-icon">◈</span><span class="bl-label">ABOUT US</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('Our Vision','◉','our vision','Our roadmap for building the most comprehensive Sanskrit learning platform on the web — coming soon.')"><span class="bl-icon">◉</span><span class="bl-label">OUR VISION</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="location.href='/blog'"><span class="bl-icon">◇</span><span class="bl-label">BLOGS</span></button>
    <button class="bottom-bar-link bl-desktop" onclick="window.openComingSoon('Other Products','⬡','other products','Explore our other language and education tools — coming soon.')"><span class="bl-icon">⬡</span><span class="bl-label">OTHER PRODUCTS</span></button>
    <button class="bottom-bar-link bl-mobile-only" id="explore-btn" onclick="window.toggleExploreDropdown()"><span class="bl-icon">◈</span><span class="bl-label">EXPLORE</span><span class="explore-chevron">▾</span></button>
    <button class="bottom-bar-link donate-link" onclick="window.openComingSoon('Donate','♥','donate','Help keep this project alive and free for everyone. Every contribution matters — coming soon.')"><span class="bl-icon">♥</span><span class="bl-label">DONATE</span></button>
  </footer>
</div>
<script>(function(){
  var bb=document.getElementById('bottom-bar');
  var tabIcon=document.getElementById('bottom-bar-tab-icon');
  var tabLabel=document.getElementById('bottom-bar-tab-label');
  var collapsed=localStorage.getItem('sk_bar')==='0';
  if(collapsed){bb.classList.add('collapsed');document.body.classList.add('bar-collapsed');tabIcon.textContent='▲';tabLabel.textContent='OPEN';}
})();</script>

<script type="module" src="/src/js/path.js"></script>
</body>
</html>
